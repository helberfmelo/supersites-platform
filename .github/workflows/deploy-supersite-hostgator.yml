name: Deploy SuperSite HostGator
run-name: Fase ${{ inputs.phase || 'unmapped' }} Sprint ${{ inputs.sprint || 'unmapped' }} - Deploy SuperSite HostGator - ${{ inputs.action }}

on:
  workflow_dispatch:
    inputs:
      phase:
        description: Roadmap phase/stage number for run labeling, e.g. 9.
        required: false
        default: unmapped
        type: string
      sprint:
        description: Roadmap sprint number for run labeling, e.g. 9.16.
        required: false
        default: unmapped
        type: string
      action:
        description: Deploy, rollback to a release, or return /supersites/ to placeholders.
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - rollback-release
          - rollback-placeholder
      release_id:
        description: Required only for rollback-release.
        required: false
        type: string
      enable_root_redirect:
        description: Redirect https://opentshost.com/ to /supersites/ when no unmanaged root .htaccess exists.
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  deploy_supersite:
    name: Deploy SuperSites Hub
    runs-on: ubuntu-latest
    environment: production-hostgator
    env:
      SUPERSITES_CPANEL_HOST: ${{ vars.SUPERSITES_CPANEL_HOST }}
      SUPERSITES_CPANEL_PORT: ${{ vars.SUPERSITES_CPANEL_PORT }}
      SUPERSITES_CPANEL_USER: ${{ secrets.SUPERSITES_CPANEL_USER }}
      SUPERSITES_CPANEL_PASSWORD: ${{ secrets.SUPERSITES_CPANEL_PASSWORD }}
      ROADMAP_PHASE: ${{ inputs.phase || 'unmapped' }}
      ROADMAP_SPRINT: ${{ inputs.sprint || 'unmapped' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        if: inputs.action == 'deploy'
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Enable pnpm
        if: inputs.action == 'deploy'
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Install Node dependencies
        if: inputs.action == 'deploy'
        run: pnpm install --frozen-lockfile

      - name: Deploy or rollback
        shell: pwsh
        run: |
          Write-Host "Roadmap context: Fase $env:ROADMAP_PHASE Sprint $env:ROADMAP_SPRINT"

          $action = '${{ inputs.action }}'
          $releaseId = '${{ inputs.release_id }}'
          $enableRootRedirect = '${{ inputs.enable_root_redirect }}' -eq 'true'

          $deployArgs = @{}
          if ($enableRootRedirect) {
            $deployArgs.EnableRootRedirect = $true
          }

          if ($action -eq 'deploy') {
            $deployArgs.ReleaseId = '${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}'
          } elseif ($action -eq 'rollback-release') {
            if (-not $releaseId) {
              throw 'release_id is required for rollback-release.'
            }
            $deployArgs.RollbackReleaseId = $releaseId
            $deployArgs.SkipBuild = $true
          } elseif ($action -eq 'rollback-placeholder') {
            $deployArgs.RollbackToPlaceholder = $true
            $deployArgs.SkipBuild = $true
          } else {
            throw "Unsupported deploy action: $action"
          }

          ./scripts/publish-supersite-hostgator.ps1 @deployArgs

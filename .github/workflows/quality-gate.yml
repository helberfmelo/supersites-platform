name: Quality Gate

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  repository-safety:
    name: Repository safety
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: pnpm

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate no committed secrets
        shell: pwsh
        run: ./scripts/validate-no-secrets.ps1

      - name: Validate required structure
        shell: pwsh
        run: ./scripts/validate-structure.ps1

      - name: Test Nuxt catalog
        run: pnpm --filter @supersites/supersite test

      - name: Build Nuxt catalog
        run: pnpm --filter @supersites/supersite build

      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo_mysql, sqlite, pdo_sqlite
          tools: composer:v2

      - name: Install Laravel dependencies
        working-directory: apps/control-plane
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel test env
        working-directory: apps/control-plane
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Validate Laravel app
        working-directory: apps/control-plane
        run: |
          composer validate --strict
          php artisan test

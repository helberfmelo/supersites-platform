name: Quality Gate

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      run_all: ${{ steps.detect.outputs.run_all }}
      frontend_supersite: ${{ steps.detect.outputs.frontend_supersite }}
      frontend_netprobe: ${{ steps.detect.outputs.frontend_netprobe }}
      frontend_calcharbor: ${{ steps.detect.outputs.frontend_calcharbor }}
      frontend_devutility: ${{ steps.detect.outputs.frontend_devutility }}
      frontend_timenexus: ${{ steps.detect.outputs.frontend_timenexus }}
      backend_control_plane: ${{ steps.detect.outputs.backend_control_plane }}
      deployment: ${{ steps.detect.outputs.deployment }}
      docs_only: ${{ steps.detect.outputs.docs_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed scopes
        id: detect
        shell: pwsh
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: ./scripts/ci-detect-changes.ps1

  repository_safety:
    name: Repository safety
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate no committed secrets
        shell: pwsh
        run: ./scripts/validate-no-secrets.ps1

      - name: Validate required structure
        shell: pwsh
        run: ./scripts/validate-structure.ps1

  frontend_supersite:
    name: Frontend / SuperSites Hub
    runs-on: ubuntu-latest
    needs:
      - changes
      - repository_safety
    if: needs.changes.outputs.frontend_supersite == 'true' || needs.changes.outputs.deployment == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Test shared packages
        run: pnpm test:packages

      - name: Typecheck shared packages
        run: pnpm typecheck:packages

      - name: Test Nuxt catalog
        run: pnpm --filter @supersites/supersite test

      - name: Build Nuxt catalog
        run: pnpm --filter @supersites/supersite build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke Nuxt preview
        shell: pwsh
        run: ./scripts/validate-supersite-preview.ps1

      - name: Playwright visual smoke
        run: pnpm test:e2e:supersite

  frontend_netprobe:
    name: Frontend / NetProbe Atlas
    runs-on: ubuntu-latest
    needs:
      - changes
      - repository_safety
    if: needs.changes.outputs.frontend_netprobe == 'true' || needs.changes.outputs.deployment == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Test shared packages
        run: pnpm test:packages

      - name: Typecheck shared packages
        run: pnpm typecheck:packages

      - name: Test Nuxt NetProbe Atlas
        run: pnpm --filter @supersites/netprobe-atlas test

      - name: Build Nuxt NetProbe Atlas
        run: pnpm --filter @supersites/netprobe-atlas build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke NetProbe preview
        shell: pwsh
        run: ./scripts/validate-netprobe-preview.ps1

      - name: Playwright visual smoke
        run: pnpm test:e2e:netprobe

  frontend_calcharbor:
    name: Frontend / CalcHarbor
    runs-on: ubuntu-latest
    needs:
      - changes
      - repository_safety
    if: needs.changes.outputs.frontend_calcharbor == 'true' || needs.changes.outputs.deployment == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Test shared packages
        run: pnpm test:packages

      - name: Typecheck shared packages
        run: pnpm typecheck:packages

      - name: Test Nuxt CalcHarbor
        run: pnpm --filter @supersites/calcharbor test

      - name: Build Nuxt CalcHarbor
        run: pnpm --filter @supersites/calcharbor build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke CalcHarbor preview
        shell: pwsh
        run: ./scripts/validate-calcharbor-preview.ps1

      - name: Playwright visual smoke
        run: pnpm test:e2e:calcharbor

  frontend_devutility:
    name: Frontend / DevUtility Lab
    runs-on: ubuntu-latest
    needs:
      - changes
      - repository_safety
    if: needs.changes.outputs.frontend_devutility == 'true' || needs.changes.outputs.deployment == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Test shared packages
        run: pnpm test:packages

      - name: Typecheck shared packages
        run: pnpm typecheck:packages

      - name: Test Nuxt DevUtility Lab
        run: pnpm --filter @supersites/devutility-lab test

      - name: Build Nuxt DevUtility Lab
        run: pnpm --filter @supersites/devutility-lab build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke DevUtility preview
        shell: pwsh
        run: ./scripts/validate-devutility-preview.ps1

      - name: Playwright visual smoke
        run: pnpm test:e2e:devutility

  frontend_timenexus:
    name: Frontend / TimeNexus
    runs-on: ubuntu-latest
    needs:
      - changes
      - repository_safety
    if: needs.changes.outputs.frontend_timenexus == 'true' || needs.changes.outputs.deployment == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Test shared packages
        run: pnpm test:packages

      - name: Typecheck shared packages
        run: pnpm typecheck:packages

      - name: Test Nuxt TimeNexus
        run: pnpm --filter @supersites/timenexus test

      - name: Build Nuxt TimeNexus
        run: pnpm --filter @supersites/timenexus build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke TimeNexus preview
        shell: pwsh
        run: ./scripts/validate-timenexus-preview.ps1

      - name: Playwright visual smoke
        run: pnpm test:e2e:timenexus

  backend_control_plane:
    name: Backend / Control Plane
    runs-on: ubuntu-latest
    needs:
      - changes
      - repository_safety
    if: needs.changes.outputs.backend_control_plane == 'true' || needs.changes.outputs.deployment == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo_mysql, sqlite, pdo_sqlite
          tools: composer:v2

      - name: Install Laravel dependencies
        working-directory: apps/control-plane
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel test env
        working-directory: apps/control-plane
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Validate Laravel app
        working-directory: apps/control-plane
        run: |
          composer validate --strict
          php artisan test

  quality_summary:
    name: Quality summary
    runs-on: ubuntu-latest
    needs:
      - changes
      - repository_safety
      - frontend_supersite
      - frontend_netprobe
      - frontend_calcharbor
      - frontend_devutility
      - frontend_timenexus
      - backend_control_plane
    if: always()
    steps:
      - name: Check required job results
        shell: pwsh
        run: |
          $results = @{
            changes = '${{ needs.changes.result }}'
            repository_safety = '${{ needs.repository_safety.result }}'
            frontend_supersite = '${{ needs.frontend_supersite.result }}'
            frontend_netprobe = '${{ needs.frontend_netprobe.result }}'
            frontend_calcharbor = '${{ needs.frontend_calcharbor.result }}'
            frontend_devutility = '${{ needs.frontend_devutility.result }}'
            frontend_timenexus = '${{ needs.frontend_timenexus.result }}'
            backend_control_plane = '${{ needs.backend_control_plane.result }}'
          }

          $results.GetEnumerator() | Sort-Object Name | ForEach-Object {
            Write-Host "$($_.Key): $($_.Value)"
          }

          $required = @('changes', 'repository_safety')
          $invalidRequired = $results.GetEnumerator() | Where-Object {
            $_.Key -in $required -and $_.Value -ne 'success'
          }

          $invalidOptional = $results.GetEnumerator() | Where-Object {
            $_.Key -notin $required -and $_.Value -notin @('success', 'skipped')
          }

          if ($invalidRequired -or $invalidOptional) {
            throw "One or more required quality jobs failed or were cancelled."
          }

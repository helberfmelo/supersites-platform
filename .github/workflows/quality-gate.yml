name: Quality Gate

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      run_all: ${{ steps.detect.outputs.run_all }}
      frontend_supersite: ${{ steps.detect.outputs.frontend_supersite }}
      frontend_netprobe: ${{ steps.detect.outputs.frontend_netprobe }}
      frontend_calcharbor: ${{ steps.detect.outputs.frontend_calcharbor }}
      frontend_devutility: ${{ steps.detect.outputs.frontend_devutility }}
      frontend_timenexus: ${{ steps.detect.outputs.frontend_timenexus }}
      frontend_qrroute: ${{ steps.detect.outputs.frontend_qrroute }}
      frontend_invoicecraft: ${{ steps.detect.outputs.frontend_invoicecraft }}
      frontend_mailhealth: ${{ steps.detect.outputs.frontend_mailhealth }}
      frontend_sitepulse: ${{ steps.detect.outputs.frontend_sitepulse }}
      frontend_pixelbatch: ${{ steps.detect.outputs.frontend_pixelbatch }}
      frontend_docshift: ${{ steps.detect.outputs.frontend_docshift }}
      backend_control_plane: ${{ steps.detect.outputs.backend_control_plane }}
      deployment: ${{ steps.detect.outputs.deployment }}
      docs_only: ${{ steps.detect.outputs.docs_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed scopes
        id: detect
        shell: pwsh
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: ./scripts/ci-detect-changes.ps1

  repository_safety:
    name: Repository safety
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate no committed secrets
        shell: pwsh
        run: ./scripts/validate-no-secrets.ps1

      - name: Validate required structure
        shell: pwsh
        run: ./scripts/validate-structure.ps1

  frontend_supersite:
    name: Frontend / SuperSites Hub
    runs-on: ubuntu-latest
    needs:
      - changes
      - repository_safety
    if: needs.changes.outputs.frontend_supersite == 'true' || needs.changes.outputs.deployment == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Test shared packages
        run: pnpm test:packages

      - name: Typecheck shared packages
        run: pnpm typecheck:packages

      - name: Test Nuxt catalog
        run: pnpm --filter @supersites/supersite test

      - name: Build Nuxt catalog
        run: pnpm --filter @supersites/supersite build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke Nuxt preview
        shell: pwsh
        run: ./scripts/validate-supersite-preview.ps1

      - name: Playwright visual smoke
        run: pnpm test:e2e:supersite


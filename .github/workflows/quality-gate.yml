    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo_mysql, sqlite, pdo_sqlite
          tools: composer:v2

      - name: Install Laravel dependencies
        working-directory: apps/control-plane
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel test env
        working-directory: apps/control-plane
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Validate Laravel app
        working-directory: apps/control-plane
        run: |
          composer validate --strict
          php artisan test

  public_copy_gate:
    name: Public copy gate
    runs-on: ubuntu-latest
    needs:
      - changes
      - repository_safety
    if: >-
      needs.changes.outputs.frontend_supersite == 'true' ||
      needs.changes.outputs.frontend_netprobe == 'true' ||
      needs.changes.outputs.frontend_calcharbor == 'true' ||
      needs.changes.outputs.frontend_devutility == 'true' ||
      needs.changes.outputs.frontend_timenexus == 'true' ||
      needs.changes.outputs.frontend_qrroute == 'true' ||
      needs.changes.outputs.frontend_invoicecraft == 'true' ||
      needs.changes.outputs.frontend_mailhealth == 'true' ||
      needs.changes.outputs.frontend_sitepulse == 'true' ||
      needs.changes.outputs.frontend_pixelbatch == 'true' ||
      needs.changes.outputs.frontend_docshift == 'true' ||
      needs.changes.outputs.deployment == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build public HTML
        run: |
          pnpm build
          pnpm build:netprobe
          pnpm build:calcharbor
          pnpm build:devutility
          pnpm build:timenexus
          pnpm build:qrroute
          pnpm build:invoicecraft
          pnpm build:mailhealth
          pnpm build:sitepulse
          pnpm build:pixelbatch
          pnpm build:docshift

      - name: Validate public copy
        run: pnpm validate:public-copy

  quality_summary:
    name: Quality summary
    runs-on: ubuntu-latest
    needs:
      - changes
      - repository_safety
      - frontend_supersite
      - frontend_netprobe
      - frontend_calcharbor
      - frontend_devutility
      - frontend_timenexus
      - frontend_qrroute
      - frontend_invoicecraft
      - frontend_mailhealth
      - frontend_sitepulse
      - frontend_pixelbatch
      - frontend_docshift
      - backend_control_plane
      - public_copy_gate
    if: always()
    steps:
      - name: Check required job results
        shell: pwsh
        run: |
          $results = @{
            changes = '${{ needs.changes.result }}'
            repository_safety = '${{ needs.repository_safety.result }}'
            frontend_supersite = '${{ needs.frontend_supersite.result }}'
            frontend_netprobe = '${{ needs.frontend_netprobe.result }}'
            frontend_calcharbor = '${{ needs.frontend_calcharbor.result }}'
            frontend_devutility = '${{ needs.frontend_devutility.result }}'
            frontend_timenexus = '${{ needs.frontend_timenexus.result }}'
            frontend_qrroute = '${{ needs.frontend_qrroute.result }}'
            frontend_invoicecraft = '${{ needs.frontend_invoicecraft.result }}'
            frontend_mailhealth = '${{ needs.frontend_mailhealth.result }}'
            frontend_sitepulse = '${{ needs.frontend_sitepulse.result }}'
            frontend_pixelbatch = '${{ needs.frontend_pixelbatch.result }}'
            frontend_docshift = '${{ needs.frontend_docshift.result }}'
            backend_control_plane = '${{ needs.backend_control_plane.result }}'
            public_copy_gate = '${{ needs.public_copy_gate.result }}'
          }

          $results.GetEnumerator() | Sort-Object Name | ForEach-Object {
            Write-Host "$($_.Key): $($_.Value)"
          }

          $required = @('changes', 'repository_safety')
          $invalidRequired = $results.GetEnumerator() | Where-Object {
            $_.Key -in $required -and $_.Value -ne 'success'
          }

          $invalidOptional = $results.GetEnumerator() | Where-Object {
            $_.Key -notin $required -and $_.Value -notin @('success', 'skipped')
          }

          if ($invalidRequired -or $invalidOptional) {
            throw "One or more required quality jobs failed or were cancelled."
          }

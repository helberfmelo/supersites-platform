name: Deploy Control Plane HostGator
run-name: Fase ${{ inputs.phase || 'unmapped' }} Sprint ${{ inputs.sprint || 'unmapped' }} - Deploy Control Plane HostGator - ${{ inputs.action }}

on:
  workflow_dispatch:
    inputs:
      phase:
        description: Roadmap phase/stage number for run labeling, e.g. 9.
        required: false
        default: unmapped
        type: string
      sprint:
        description: Roadmap sprint number for run labeling, e.g. 9.16.
        required: false
        default: unmapped
        type: string
      action:
        description: Deploy, rollback to a release, or return /supersites/control-plane/ to placeholder.
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - rollback-release
          - rollback-placeholder
      release_id:
        description: Required only for rollback-release.
        required: false
        type: string
      skip_smoke:
        description: Skip public smoke after deploy or rollback. Use only for controlled diagnostics.
        required: false
        default: false
        type: boolean
      enable_diagnostics:
        description: Enable sanitized temporary diagnostics in the managed front controller.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  deploy_control_plane:
    name: Deploy Control Plane API
    runs-on: ubuntu-latest
    environment: production-hostgator
    env:
      SUPERSITES_CPANEL_HOST: ${{ vars.SUPERSITES_CPANEL_HOST }}
      SUPERSITES_CPANEL_PORT: ${{ vars.SUPERSITES_CPANEL_PORT }}
      SUPERSITES_CPANEL_USER: ${{ secrets.SUPERSITES_CPANEL_USER }}
      SUPERSITES_CPANEL_PASSWORD: ${{ secrets.SUPERSITES_CPANEL_PASSWORD }}
      SUPERSITES_CONTROL_PLANE_APP_KEY: ${{ secrets.SUPERSITES_CONTROL_PLANE_APP_KEY }}
      SUPERSITES_CONTROL_PLANE_DB_HOST: ${{ secrets.SUPERSITES_CONTROL_PLANE_DB_HOST }}
      SUPERSITES_CONTROL_PLANE_DB_PORT: ${{ secrets.SUPERSITES_CONTROL_PLANE_DB_PORT }}
      SUPERSITES_CONTROL_PLANE_DB_DATABASE: ${{ secrets.SUPERSITES_CONTROL_PLANE_DB_DATABASE }}
      SUPERSITES_CONTROL_PLANE_DB_USERNAME: ${{ secrets.SUPERSITES_CONTROL_PLANE_DB_USERNAME }}
      SUPERSITES_CONTROL_PLANE_DB_PASSWORD: ${{ secrets.SUPERSITES_CONTROL_PLANE_DB_PASSWORD }}
      SUPERSITES_STRIPE_RESTRICTED_KEY: ${{ secrets.SUPERSITES_STRIPE_RESTRICTED_KEY }}
      SUPERSITES_STRIPE_PUBLISHABLE_KEY: ${{ secrets.SUPERSITES_STRIPE_PUBLISHABLE_KEY }}
      SUPERSITES_STRIPE_SECRET_KEY: ${{ secrets.SUPERSITES_STRIPE_SECRET_KEY }}
      SUPERSITES_STRIPE_WEBHOOK_SECRET: ${{ secrets.SUPERSITES_STRIPE_WEBHOOK_SECRET }}
      ROADMAP_PHASE: ${{ inputs.phase || 'unmapped' }}
      ROADMAP_SPRINT: ${{ inputs.sprint || 'unmapped' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        if: inputs.action == 'deploy'
        uses: shivammathur/setup-php@2.37.2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Deploy or rollback
        shell: pwsh
        run: |
          Write-Host "Roadmap context: Fase $env:ROADMAP_PHASE Sprint $env:ROADMAP_SPRINT"

          $action = '${{ inputs.action }}'
          $releaseId = '${{ inputs.release_id }}'

          $deployArgs = @{}

          if ($action -eq 'deploy') {
            $deployArgs.ReleaseId = '${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}'
            if ('${{ inputs.enable_diagnostics }}' -eq 'true') {
              $deployArgs.EnableDiagnostics = $true
            }
          } elseif ($action -eq 'rollback-release') {
            if (-not $releaseId) {
              throw 'release_id is required for rollback-release.'
            }
            $deployArgs.RollbackReleaseId = $releaseId
            $deployArgs.SkipBuild = $true
          } elseif ($action -eq 'rollback-placeholder') {
            $deployArgs.RollbackToPlaceholder = $true
            $deployArgs.SkipBuild = $true
          } else {
            throw "Unsupported deploy action: $action"
          }

          if ('${{ inputs.skip_smoke }}' -eq 'true') {
            $deployArgs.SkipSmoke = $true
          }

          ./scripts/publish-control-plane-hostgator.ps1 @deployArgs

name: supersites-local

services:
  mysql:
    image: mysql:8.4
    container_name: supersites-mysql
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      MYSQL_ROOT_PASSWORD: ${SUPERSITES_MYSQL_ROOT_PASSWORD}
      MYSQL_ROOT_HOST: "%"
    ports:
      - "${SUPERSITES_MYSQL_PORT:-3317}:3306"
    volumes:
      - supersites_mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${SUPERSITES_MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.2-alpine
    container_name: supersites-redis
    restart: unless-stopped
    ports:
      - "${SUPERSITES_REDIS_PORT:-6381}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  mailpit:
    image: axllent/mailpit:latest
    container_name: supersites-mailpit
    restart: unless-stopped
    ports:
      - "${SUPERSITES_MAILPIT_SMTP_PORT:-1035}:1025"
      - "${SUPERSITES_MAILPIT_WEB_PORT:-8035}:8025"

volumes:
  supersites_mysql_data:
